# Lean Bulk Guidelines

## Overview

Lean bulking is the process of gaining muscle with minimal fat gain by
maintaining a modest calorie surplus (300-500 kcal above TDEE) while
prioritizing protein intake and training stimulus.

## Weight Gain Targets

| Metric | Target | Notes |
|--------|--------|-------|
| Weekly gain (ideal) | 0.25-0.5 kg/week | Slow, controlled gain |
| Weekly gain (too fast) | >0.5 kg/week | Excess fat gain |
| Weekly gain (too slow) | <0.25 kg/week | Not maximizing growth potential |
| Monthly gain (ideal) | 1-2 kg/month | Sustainable over 6-12 months |

## Calorie Surplus

| Condition | Action | Evidence |
|-----------|--------|----------|
| Gaining 0.25-0.5 kg/week | Maintain current calories | Helms et al. (2014) |
| Gaining <0.25 kg/week for 2 weeks | +100 kcal/day | Slater et al. (2019) |
| Gaining >0.5 kg/week | -100 kcal/day | Aragon & Schoenfeld (2020) |
| Weight stable for 2+ weeks on surplus | +200 kcal/day | Helms et al. (2014) |

## Protein Requirements

| Metric | Amount | Evidence |
|--------|--------|----------|
| Minimum for muscle gain | 1.6 g/kg | Morton et al. (2018) |
| Optimal range | 1.6-2.2 g/kg | Schoenfeld & Aragon (2018) |
| Upper limit (no added benefit) | >2.2 g/kg | Morton et al. (2018) |
| Current user at 63.4 kg | 140-170 g/day | 2.2-2.7 g/kg (above optimal) |

## Lean Bulk Quality Score

| Score | Label | Criteria |
|-------|-------|----------|
| 90-100 | Excellent | Protein ≥90% target, gain 0.25-0.5 kg/week, surplus within ±100 kcal |
| 75-89 | Good | Protein ≥80% target, gain 0.2-0.6 kg/week, surplus within ±200 kcal |
| 50-74 | Fair | Protein ≥70% target, gain 0.1-0.7 kg/week, surplus within ±300 kcal |
| 25-49 | Poor | Protein <70% target, gain <0.1 or >0.7 kg/week, surplus off by >300 kcal |
| 0-24 | Critical | Major deficits in multiple metrics |

## Adjustment Steps

- Calorie adjustments should be ±100-200 kcal/day
- Wait at least 2 weeks before evaluating an adjustment
- Protein target is static at 1.6-2.2 g/kg regardless of calorie adjustment
- Carbs should be adjusted first, then fat

